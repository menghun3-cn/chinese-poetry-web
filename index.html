<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="基于全唐诗、全宋诗、全宋词、元曲等古典诗词数据构建的中文诗词阅读网站，支持多文集、标签、作者检索，提供沉浸式阅读体验。"
    />

    <!-- 预加载关键数据 -->
    <link rel="preconnect" href="/" />
    <link rel="preload" href="/poetry-data/meta.json" as="fetch" crossorigin="anonymous" />
    <link rel="preload" href="/poetry-data/optimized-index.json" as="fetch" crossorigin="anonymous" />

    <!-- DNS 预取 -->
    <link rel="dns-prefetch" href="https://chinese-poetry-web-at3.pages.dev" />

    <title>诗库 | 中文诗词阅读</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('[SW] 注册成功:', reg.scope);
      reg.addEventListener('updatefound', () => {
        const installing = reg.installing;
        if (installing) {
          installing.addEventListener('statechange', () => {
            if (installing.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[SW] 新版本可用');
            }
          });
        }
      });
    }).catch(err => console.warn('[SW] 注册失败:', err));
  });
}
// 移除加载骨架屏
window.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('app-loading');
  if (el) {
    // Vue 挂载后会自动替换 #app 内容
    const observer = new MutationObserver(() => {
      if (!document.getElementById('app-loading')) {
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('app'), { childList: true, subtree: true });
  }
});
</script>
</body>
</html>
