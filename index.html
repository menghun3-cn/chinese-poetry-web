<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="基于全唐诗、全宋诗、全宋词、元曲等38万+古典诗词数据构建的沉浸式中文诗词阅读平台。" />

    <!-- 预加载关键数据 -->
    <link rel="preconnect" href="/" />
    <link rel="preload" href="/poetry-data/meta.json" as="fetch" crossorigin="anonymous" />
    <link rel="preload" href="/poetry-data/inline-overview.json" as="fetch" crossorigin="anonymous" />

    <!-- DNS 预取 -->
    <link rel="dns-prefetch" href="https://chinese-poetry-web-at3.pages.dev" />

    <title>诗库 | 中文诗词典藏</title>

    <style>
      /* 首屏加载提示 - Vue 挂载前显示 */
      #app-loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--color-page, #f5f1eb); flex-direction: column; gap: 1rem; padding: 2rem; }
      #app-loading .logo svg { width: 2.5rem; height: 2.5rem; }
      #app-loading h1 { font-size: 1.125rem; font-weight: 700; color: #1a1a1a; letter-spacing: 0.08em; }
      #app-loading p { font-size: 0.8125rem; color: #888; }
      #app-loading .bar { width: 100%; max-width: 20rem; height: 0.375rem; background: #e0ddd6; border-radius: 9999px; overflow: hidden; }
      #app-loading .bar-fill { height: 100%; width: 30%; background: linear-gradient(90deg, #8b5a2b, #c4956a); border-radius: 9999px; animation: loading-pulse 1.5s ease-in-out infinite; }
      @keyframes loading-pulse { 0%,100% { width: 30%; } 50% { width: 60%; } }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-loading">
        <div class="logo">
          <svg viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="#8b5a2b" opacity="0.1" />
            <path d="M16 28c0-6.627 5.373-12 12-12s12 5.373 12 12" stroke="#8b5a2b" stroke-width="2.5" stroke-linecap="round" />
            <path d="M12 34c0-8.837 7.163-16 16-16s16 7.163 16 16" stroke="#8b5a2b" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />
            <circle cx="28" cy="22" r="2" fill="#8b5a2b" />
          </svg>
        </div>
        <h1>中华诗词典藏</h1>
        <p>正在加载诗词索引</p>
        <div class="bar"><div class="bar-fill" /></div>
        <p>首次打开会读取构建生成的静态 JSON</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('[SW] 注册成功:', reg.scope);
      reg.addEventListener('updatefound', () => {
        const installing = reg.installing;
        if (installing) {
          installing.addEventListener('statechange', () => {
            if (installing.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[SW] 新版本可用');
            }
          });
        }
      });
    }).catch(err => console.warn('[SW] 注册失败:', err));
  });
}
</script>
</body>
</html>
